version: '2'
services:
  zookeeper:
    image: docker.io/bitnami/zookeeper:3.7
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
  kafka:
    image: docker.io/bitnami/kafka:3
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    links:
      - zookeeper
    depends_on:
      - zookeeper
  kafka-manager:
    image: reg.deeproute.ai/deeproute-public/kafkamanager/kafka-manager:3.0.0.4
    ports:
      - "9000:9000"
    environment:
      - ZK_HOSTS=zookeeper:2181
    links:
      - zookeeper
      - kafka
    depends_on:
      - zookeeper
      - kafka
  elasticsearch:
    ports:
      - 9200:9200
    image: elasticsearch:7.8.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - cluster.name=demo-es
  logstash:
    image: logstash:7.8.0
    ports:
      - "9600:9600"
    volumes:
      - $PWD/development/pipeline.conf:/usr/share/logstash/pipeline/pipeline.conf
    links:
      - kafka
      - elasticsearch
    depends_on:
      - elasticsearch
  kibana:
    image: kibana:7.8.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200/
    links:
      - elasticsearch
    depends_on:
      - elasticsearch

  log-tail:
    image: reg.deeproute.ai/deeproute-public/kube-log-helper:0.0.1
    volumes:
      - /etc/localtime:/etc/localtime
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/filebeat-data:/var/lib/filebeat
      - /var/lib/docker/containers:/host/var/lib/docker/containers:ro
      - /var/log/syslog:/host/var/log/syslog:ro
      - $PWD:/srv
      - $PWD/assets/filebeat/config.filebeat:/srv/config.filebeat
      - $PWD/assets/filebeat/filebeat.tpl:/srv/filebeat.tpl
      - $PWD/assets/entrypoint:/srv/entrypoint
    cap_add:
      - SYS_ADMIN
    entrypoint: ["/bin/sh", "-c", "sleep 36000000"]
    environment:
#      LOGGING_OUTPUT: elasticsearch
#      ELASTICSEARCH_HOSTS: elasticsearch:9200
      LOGGING_OUTPUT: kafka
      KAFKA_BROKERS: kafka:9092
#      LOGGING_ENABLE_HOST: true
#      FILEBEAT_INDEX: rawcontainer
#      FILEBEAT_INDEX_TEMPLATE_FILES: raw.yml
    links:
      - elasticsearch
      - kafka
      - kibana
    depends_on:
      - elasticsearch
      - kafka
      - kibana
